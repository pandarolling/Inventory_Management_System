<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Product</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<aside>
        <div class="logo-section">
            <div class="logo">
                <img src="logo.jpeg" alt="" id="logo-icon">
            </div>
            <div class="title">
                ScrIMS
            </div>
        </div>

        <div class="separator-line"> </div>

        <div class="overview">
            <span>Overview</span>
            <div class="dashboard">
                <a href="index.html">Dashboard</a>
            </div>
            <div class="catalog">
                <a href="catalog.html">Catalog</a>
            </div>
            <div class="categories">
               <a href="categories.html">Categories</a> 
            </div>
        </div>

        <div class="transactions">
            <span>Transactions</span>
            <div class="stock-in">
                <a href="stock-in.html">Stock In</a>
            </div>
            <div class="stock-out">
                <a href="stock-out.html">Stock Out</a>
            </div>
            <div class="add-product">
                <a href="add-product.html">Add Product</a>
            </div>
        </div>

        <div class="insights">
            <span>Insights</span>
            <div class="alerts">
                <a href="alerts.html">Alerts</a>
            </div>
            <div class="reports">
                <a href="reports.html">Reports</a>
            </div>
        </div>

        
    </aside>

    <div class="page">
        <div class="top-area">      
            <div class="profile-section">

                <button id="profile-letter">T</button>

                <div class="user-info">
                    <div class="user-name">
                        Tim
                    </div>
                    <div class="role">
                        Admin
                    </div>
                </div>
            </div>
            <input type="text" placeholder="Seach SKU, products..." id= "search-bar">

        </div>

        <div class="separator-line"> </div>
        

        <div class="mid-area">

            <!-- ============================================================= -->
            <!-- TODO: FEATURES TO ADD ON THIS PAGE (Add Product / add-product.html) -->
            <!-- ============================================================= -->

            <!-- HTML FEATURES:
                 (Form already exists — good! Consider adding:)
                 1. Add a <p id="success-msg" style="display:none; color:green">Product added!</p>
                    to show after successful submission
                 2. Add <label> tags wrapping each field name for better accessibility
                    e.g. <label for="product-name">Product Name</label>
                 3. Add "required" attribute to important inputs
                    e.g. <input type="text" required>
            -->

            <!-- JS FEATURES (use script.js):
                 1. FORM VALIDATION — when "Add Product" button is clicked,
                    check that product name, SKU, quantity, and price are filled
                    Hint: if (!nameInput.value || !skuInput.value) { alert("Fill required fields"); return; }

                 2. SAVE TO LOCALSTORAGE — store the new product in an array
                    saved in localStorage so other pages can read it
                    Hint: let products = JSON.parse(localStorage.getItem("products")) || [];
                          products.push({ name, sku, category, supplier, qty, price, desc });
                          localStorage.setItem("products", JSON.stringify(products));

                 3. SHOW SUCCESS MESSAGE — after saving, show #success-msg
                    and hide it after 3 seconds
                    Hint: msg.style.display = "block";
                          setTimeout(() => msg.style.display = "none", 3000);

                 4. CLEAR FORM — after saving, reset all input fields
                    Hint: document.querySelectorAll(".input-area input").forEach(i => i.value = "")

                 5. PREVENT DUPLICATE SKU — before saving, check if a product
                    with the same SKU already exists
                    Hint: products.some(p => p.sku === skuInput.value)
            -->

          <div class="info-line">
            <h2><strong>Add a New Product</strong>  </h2>
            <p>Register a new product into inventory</p>
          </div>

          <div class="input-area">
            <div class="product-name">
              Product name
              <input type="text" placeholder="e.g. Mouse">
            </div>
            <div class="SKU-code">
              SKU Code
              <input type="text" placeholder="e.g. MS-WRLS-01">
            </div>
            <div class="category">
              Category
              <select name="category" id="category" >
                <option value="Select a Category">Select a Category</option>
                <option value="Accessories"> Accessories</option>
                 <option value="Cables">Cables </option>
                  <option value="Chargers"> Chargers</option>
                   <option value="Audio"> Audio</option>
              </select>
            </div>
            <div class="supplier">
              Supplier
              <input type="text" placeholder="TechyCom">
            </div>
            <div class="quantity">
              Quantity
              <input type="number" placeholder="0">
            </div>
            <div class="price">
              Price(₹)
              <input type="number" placeholder="0.00" >
            </div>

            <div class="description-box">
              Description
              <input type="text" placeholder="Describe your product">
            </div>

            <div class="action-btn">
              <button class="add-btn">Add Product</button>
              <a href="index.html" id="cancel-link">Cancel</a>
            </div>
          </div>
        </div>
    </div>
<script src="script.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
